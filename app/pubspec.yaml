name: thuanduong_app
description: Thuận Chuyến — ứng dụng ghép chuyến xe liên tỉnh Việt Nam
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & Auth
  dio: ^5.4.3
  shared_preferences: ^2.2.3
  jwt_decoder: ^2.0.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.5

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  pinput: ^5.0.0
  flutter_animate: ^4.5.0

  # Map & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^11.1.0
  geocoding: ^3.0.0

  # Realtime (Supabase)
  supabase_flutter: ^2.5.6

  # Social auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^8.1.0
  flutter_facebook_auth: ^7.1.7

  # Utils
  equatable: ^2.0.5
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
